<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña | SportClub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="main-header">
        <a href="index.html" class="logo">SportClub</a>
    </header>

    <div class="auth-container">
        <div class="auth-box">
            <h2>Recuperar Contraseña</h2>
            <p style="margin-bottom: 1.5rem; font-size: 0.9rem;">Ingresa tu correo electrónico y te enviaremos las instrucciones para restablecer tu contraseña.</p>
            
            <form action="login.html" onsubmit="alert('¡Mensaje de confirmación enviado! Revisa tu bandeja de entrada.');">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required placeholder="tu@correo.com">
                </div>
                <button type="submit" class="btn-primary">Enviar Instrucciones</button>
            </form>
            
            <div class="auth-links" style="margin-top: 1.5rem;">
                <a href="login.html">Volver al inicio de sesión</a>
            </div>
        </div>
    </div>

</body>
</html>
