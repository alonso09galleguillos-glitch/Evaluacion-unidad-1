<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | SportClub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="main-header">
        <a href="index.html" class="logo-container">
            <img src="image_0.png" alt="SportClub Logo" class="header-logo">
        </a>
    </header>

    <div class="auth-container">
        <div class="auth-box">
            <img src="image_0.png" alt="SportClub Logo" class="auth-box-logo">
            <h2>Crear Cuenta</h2>
            <form action="login.html">
                <div class="form-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" required placeholder="Ej: Juan Pérez">
                </div>
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required placeholder="tu@correo.com">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="********">
                </div>
                <div class="form-group">
                    <label for="info">Información adicional (Opcional)</label>
                    <input type="text" id="info" placeholder="¿Qué deporte te interesa?">
                </div>
                <button type="submit" class="btn-primary">Registrarme</button>
            </form>
            
            <div class="auth-links" style="margin-top: 1.5rem;">
                <a href="login.html">¿Ya tienes cuenta? Inicia sesión aquí</a>
            </div>
        </div>
    </div>

</body>
</html>
