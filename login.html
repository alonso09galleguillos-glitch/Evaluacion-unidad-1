<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SportClub</title>
    <link rel="stylesheet" href="styles.css">  
</head>
<body>

    <header class="main-header">
        <a href="index.html" class="logo-container">
            <img src="image_0.png" alt="SportClub Logo" class="header-logo">
        </a>
    </header>

    <div class="auth-container">
        <div class="auth-box">
            <img src="image_0.png" class="auth-box-logo" alt="SportClub Logo">
            
            <h2>Iniciar Sesión</h2>
            
            <p style="margin-bottom: 1.5rem; font-size: 0.9rem; color: #555;">Ingresa tus credenciales para acceder a tu cuenta.</p>
            
            <form action="dashboard-user.html">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required placeholder="tu@correo.com">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="********">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 0.5rem;">Ingresar</button>
            </form>
            
            <div class="auth-links">
                <a href="recuperar.html">¿Olvidaste tu contraseña?</a>
                <a href="registro.html">¿No tienes cuenta? Regístrate</a>
            </div>
        </div>
    </div>

</body>
</html>
